<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Konata Station - Minimal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/76P7vwVG/ks-logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/LaionMaou/konata-station-player-old@v0.0.4/styles/index.css">
</head>

<body>

    <div class="container">
        <div class="content">
            <!-- Logo centrado -->
            <div class="logo-wrap">
                <img src="https://i.postimg.cc/W4NmH6TS/zyro-image.png"
                     alt="Logo de Konata Station">
            </div>

            <!-- Player (iframe) -->
            <iframe src="player/index.html" class="player-frame" title="Player de Konata Station" width="260" height="390"
                scrolling="no" loading="lazy" allow="autoplay"></iframe>

            <!-- Texto debajo del player -->
            <div class="player-text">
                Escucha Konata Station <a href="https://ksradio.xyz"
                    target="_blank" rel="noopener noreferrer">aquí</a>.
            </div>
        </div>

        <div class="chat">
            <div class="chat-header">🌸 Anime Chat</div>

            <!-- Xat embed -->
            <iframe src="https://xat.com/embed/chat.php#id=67308482&gn=KonataStation" class="chat-frame" title="Chat de Konata Station" allow="clipboard-write"
                width="670" height="640" scrolling="no" loading="lazy"></iframe>
        </div>
    </div>
</body>

</html>
