<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reproductor de Konata Station">
    <title>Konata Station Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/LaionMaou/konata-station-player-old@v0.0.4/css/styles.css">
    <link rel="stylesheet" href="./player.css">
</head>
<body>
    <main id="contend" class="player-shell">
        <iframe
            id="statusFrame"
            class="status-frame"
            src="./status/current.html"
            title="Estado actual de la radio"
            width="230"
            height="370"
            scrolling="no"
            loading="lazy"></iframe>

        <div id="player">
            <audio id="audio" preload="none" playsinline>
                <source src="https://stream.host-cx.net.ar/listen/konata-station-3/radio.mp3" type="audio/mpeg">
            </audio>

            <button class="play_pause" id="playPause" type="button" aria-label="Reproducir radio">
                <img id="playIcon" src="./icons/play.svg" width="24" height="24" alt="Control de reproducción">
            </button>

            <img class="volume_icon" src="./icons/volume.svg" alt="Volumen">

            <input id="volume" class="volume_control" type="range" min="0" max="1" step="0.01" value="1" aria-label="Control de volumen">
        </div>

        <p id="playerStatus" class="sr-only" aria-live="polite">Player listo.</p>
    </main>

    <script src="https://cdn.jsdelivr.net/gh/LaionMaou/konata-station-player-old@v0.0.4/player/player.js" defer></script>
</body>
</html>
