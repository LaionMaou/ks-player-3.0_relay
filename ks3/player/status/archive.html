<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado archivo</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body data-api-url="https://stream.host-cx.net.ar/api/nowplaying/3" data-mode="archive">
    <main class="panel">
        <section class="topbar compact">
            <div class="pill">
                <span class="pill-label">Oyentes</span>
                <span id="listeners_count" class="pill-value">0</span>
            </div>
            <div class="pill">
                <span class="pill-label">Bitrate</span>
                <span><span id="bitrate" class="pill-value">--</span> kbps</span>
            </div>
        </section>

        <section class="cover-card">
            <img id="cover_art" alt="Portada actual" src="https://placehold.co/200x200/1b213d/f4f6ff?text=Konata">
        </section>

        <section class="text-card">
            <div class="eyebrow">Archivo / Programación</div>
            <p id="stream_title" class="status-value">Cargando...</p>
        </section>

        <section class="text-card">
            <div class="eyebrow">Contenido actual</div>
            <p id="current_song" class="status-value">Cargando...</p>
        </section>
    </main>

    <script src="./app.js" defer></script>
</body>
</html>
